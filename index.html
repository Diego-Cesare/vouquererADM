<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Vou Querer - ADM</title>
  </head>
  <body>
    <div class="dashboard-conteiner">
      <header>
        <div class="titulo">
          <span>ADM</span>
          <span>Vou Querer</span>
        </div>
        <div class="total-badge">
          <div class="total">
            <span class="material-symbols-outlined"> add </span>
            <strong id="totalMarmitas">0</strong>
            <p>Total</p>
          </div>
          <div class="ref">
            <span class="material-symbols-outlined">
              delivery_truck_speed
            </span>
            <strong id="totalEntrega">0</strong>
            <p>Entrega</p>
          </div>
          <div class="ref">
            <span class="material-symbols-outlined"> local_dining </span>
            <strong id="totalRefeitorio">0</strong>
            <p>Refeitório</p>
          </div>
        </div>
      </header>
      <main id="listaPedidos">
        <p
          style="
            text-align: center;
            color: var(--fg-muted);
            width: 100%;
            margin-top: 40px;
          "
        >
          Carregando pedidos do Firebase...
        </p>
      </main>
    </div>

    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
